<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBot - Nishanth Rajan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: 70vh; }
        .message-bot { background-color: #f3f4f6; color: #1f2937; }
        .message-user { background-color: #2563eb; color: white; align-self: flex-end; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-2xl mx-auto mt-10 p-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">TalentBot 🤖</h1>
            <p class="text-gray-600">Ask anything about Nishanth's 15+ years of experience</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
            <div id="chat-window" class="chat-container overflow-y-auto flex flex-col gap-4 mb-4 p-2">
                <div class="message-bot p-3 rounded-lg max-w-[80%]">
                    Hi! I'm Nishanth's AI assistant. How can I help you today?
                </div>
            </div>

            <div class="flex gap-2">
                <input type="text" id="user-input" placeholder="e.g. Tell me about his CAD experience..." 
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add User Message to UI
            appendMessage(message, 'message-user');
            userInput.value = '';

            // Add "Typing..." indicator
            const typingId = 'typing-' + Date.now();
            appendMessage("TalentBot is thinking...", 'message-bot', typingId);

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Replace typing indicator with real answer
                document.getElementById(typingId).innerText = data.reply;
            } catch (error) {
                document.getElementById(typingId).innerText = "Error connecting to server. Is main.py running?";
            }
        }

        function appendMessage(text, className, id = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `${className} p-3 rounded-lg max-w-[80%]`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Allow Enter key to send
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
